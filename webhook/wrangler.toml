# Cloudflare Worker config for otp.domovina.ai (Reverse OTP service).
#
# Secrets (set via `wrangler secret put`):
#   HTTPSMS_SIGNING_KEY  — HS256 key registered in httpsms admin
#
# Public vars are below in [vars]. The custom domain route binds
# otp.domovina.ai to this worker (zone domovina.ai must already be on
# Cloudflare for the user's account).

name = "domovina-otp"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
account_id = "7dc7167b7e2e00923bfa7cd697df14e4"

# Single-instance Durable Object holds the SQLite verification store +
# Hono app. All requests fan into idFromName("global").
[[durable_objects.bindings]]
name = "VERIFICATION_STORE"
class_name = "VerificationStore"

# SQLite storage backend (required for free plan and for sql.exec()).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["VerificationStore"]

[vars]
# Cold-start fallback. Once gateways send phone.heartbeat.online events,
# the worker auto-discovers them and uses the dynamic pool. Static config
# only matters until the first heartbeat arrives.
GATEWAY_NUMBERS = "+385998710482"

# Optional allowlist (CSV). Empty = any auto-discovered phone is eligible.
# Set to keep a test phone out of the rotation, e.g. "+385991234567".
# GATEWAY_ALLOW_LIST = ""

PUBLIC_ORIGIN = "https://otp.domovina.ai"
VERIFICATION_TTL_MS = "600000"
CODE_LEN = "6"
# A gateway is considered "online" if its last heartbeat event arrived
# within this window. Heartbeat events fire on status transitions, so
# this is more of a safety bound than a freshness check.
ONLINE_CUTOFF_MS = "120000"

# Custom domain routes — Cloudflare provisions free TLS certs.
# Requires zone "domovina.ai" to be on this Cloudflare account.
[[routes]]
pattern = "otp.domovina.ai"
custom_domain = true

# Typo coverage: opt.domovina.ai is a common mistype of otp.domovina.ai.
# The worker serves a 301 redirect to the canonical host (handler in
# src/app.ts). Routing both hostnames to the same worker is what lets the
# redirect run on Cloudflare's edge.
[[routes]]
pattern = "opt.domovina.ai"
custom_domain = true

# Observability: enable Workers logs (free tier includes basic logs).
[observability]
enabled = true
