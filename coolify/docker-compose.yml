services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: coolify/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      APP_NAME: ${APP_NAME}
      APP_URL: ${APP_URL}
      USE_HTTP_LOGGER: "true"
      ENTITLEMENT_ENABLED: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      DATABASE_URL_DEDICATED: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SWAGGER_HOST: ${SWAGGER_HOST}
      EVENTS_QUEUE_TYPE: emulator
      EVENTS_QUEUE_NAME: events-local
      EVENTS_QUEUE_ENDPOINT: http://api:8000/v1/events
      EVENTS_QUEUE_USER_API_KEY: ${EVENTS_QUEUE_USER_API_KEY}
      EVENTS_QUEUE_USER_ID: ${EVENTS_QUEUE_USER_ID}
      GCS_BUCKET_NAME: ""
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_KEY: ${PUSHER_KEY:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
      CLOUDFLARE_TURNSTILE_SECRET_KEY: ${CLOUDFLARE_TURNSTILE_SECRET_KEY:-}
    expose:
      - "8000"

  web:
    build:
      context: ..
      dockerfile: coolify/web.Dockerfile
      args:
        FIREBASE_API_KEY: ${FIREBASE_API_KEY}
        FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
        FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
        FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}
        FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
        FIREBASE_APP_ID: ${FIREBASE_APP_ID}
        FIREBASE_MEASUREMENT_ID: ${FIREBASE_MEASUREMENT_ID:-}
        API_BASE_URL: ${API_BASE_URL}
        PUSHER_KEY: ${PUSHER_KEY:-}
        PUSHER_CLUSTER: ${PUSHER_CLUSTER:-}
        CLOUDFLARE_TURNSTILE_SITE_KEY: ${CLOUDFLARE_TURNSTILE_SITE_KEY:-}
        CHECKOUT_URL: ${CHECKOUT_URL:-}
        ENTERPRISE_CHECKOUT_URL: ${ENTERPRISE_CHECKOUT_URL:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"

volumes:
  postgres-data:
  redis-data:
