server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html 200.html;

    # Don't cache the SPA shell — must always reflect newest deploy.
    location = /200.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # Serve static assets aggressively cached (Nuxt fingerprints filenames).
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # Order matters:
        #  $uri          — exact file (/img/foo.png, /login/index.html if requested directly)
        #  $uri/         — directory with index.html (e.g. /threads/ -> /threads/index.html)
        #  $uri.html     — pretty URLs without trailing slash (/threads -> /threads.html)
        #  $uri/index.html — fallback if first dir-resolve missed
        #  /200.html     — SPA fallback for client-side routes (e.g. /threads/abc-123)
        try_files $uri $uri/ $uri.html $uri/index.html /200.html;
    }
}
